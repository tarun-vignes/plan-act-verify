name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -v

      - name: Run one end-to-end build
        run: python -m multi_agent_builder --idea "Internal feedback board for developer platform teams"

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t codex-creator-challenge .

      - name: Start demo container
        run: docker run -d --rm -p 8000:8000 --name codex-demo codex-creator-challenge

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs codex-demo
          exit 1

      - name: Stop demo container
        if: always()
        run: docker stop codex-demo

